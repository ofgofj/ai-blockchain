title: ブロックチェーンキャッチアップ
description: ブロックチェーン記事の日次レポート
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme

# Summary/ をルートとして扱う
include:
  - Summary

# 不要なフォルダを除外
exclude:
  - Raw
  - Master
  - scripts
  - .claude
  - .obsidian
  - log.md

defaults:
  - scope:
      path: ""
    values:
      layout: default
